<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- iPhone-friendly viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Metrics Playground (N, prevalence, TPR, FPR)</title>
  <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
  <style>
    :root{ --pad: 12px; --card: 12px; }

    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      padding: var(--pad);
      padding-left: calc(var(--pad) + env(safe-area-inset-left));
      padding-right: calc(var(--pad) + env(safe-area-inset-right));
      padding-top: calc(var(--pad) + env(safe-area-inset-top));
      padding-bottom: calc(var(--pad) + env(safe-area-inset-bottom));
      background:#fff;
    }

    h2{ font-size:18px; margin:6px 0 12px; }

    /* Desktop default */
    .grid{ display:grid; grid-template-columns: 440px 1fr; gap:18px; align-items:start; }

    .card{
      border:1px solid #ddd;
      border-radius: var(--card);
      padding: 12px;
      background:#fff;
    }

    .row{
      display:grid;
      grid-template-columns: 1fr 110px;
      gap:10px;
      align-items:center;
      margin:10px 0;
    }

    input[type="range"]{ width:100%; height:34px; }
    input[type="range"]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:26px; height:26px; border-radius:13px;
    }
    input[type="range"]::-moz-range-thumb{ width:26px; height:26px; border-radius:13px; }

    .mono{ font-variant-numeric: tabular-nums; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    .small{ color:#444; font-size:12.5px; line-height:1.35; }

    .btns{ display:flex; gap:8px; flex-wrap:wrap; margin:6px 0 2px; }
    button{
      border:1px solid #ccc;
      background:#fff;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-size:14px;
    }
    button:active{ transform: scale(0.98); }

    .kpi{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px; }
    .kpi div{ border:1px solid #eee; border-radius:10px; padding:10px; }
    .note{ border-left:4px solid #ddd; padding-left:10px; margin-top:10px; }

    .rightCol{ display:grid; grid-template-rows: auto auto; gap:12px; }
    .chartsGrid{ display:grid; grid-template-columns: 1fr; gap:12px; }
    .plot{ border:1px solid #eee; border-radius:12px; overflow:hidden; }

    .vizWrap{ margin-top:0; }
    .legend{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .chip{ display:inline-flex; align-items:center; gap:6px; border:1px solid #eee; border-radius:999px; padding:4px 8px; }
    .dot{ width:10px; height:10px; border-radius:3px; display:inline-block; border:1px solid rgba(0,0,0,0.15); }

    .svgBox{
      width:100%;
      height:240px; /* iPhone 13 portrait */
      border:1px solid #eee;
      border-radius:12px;
      overflow:hidden;
      background:#fafafa;
    }
    .caption{ margin-top:6px; }

    /* iPhone: single column + MOSAIC FIRST */
    @media (max-width: 520px){
      .grid{
        grid-template-columns: 1fr;
        gap:12px;
      }
      /* reorder: mosaic card first, inputs second */
      .card.rightCol{ order: 1; }
      .card.inputsCard{ order: 2; }
    }

    /* iPhone 13 landscape: smaller mosaic, charts side-by-side */
    @media (max-height: 450px) and (max-width: 932px){
      .svgBox{ height:210px; }
      .chartsGrid{ grid-template-columns: 1fr 1fr; }
      .plot{ height:240px !important; }
    }
  </style>
</head>
<body>
  <h2>Metrics Playground: N, imbalance, TPR, FPR → what changes?</h2>

  <div class="grid">
    <!-- MOSAIC + CHARTS (will appear first on iPhone) -->
    <div class="card rightCol">
      <div class="vizWrap">
        <h3 style="margin:0 0 6px;">Rectangle view (areas = counts)</h3>
        <div class="svgBox">
          <svg id="mosaic" viewBox="0 0 1000 500" preserveAspectRatio="none" width="100%" height="100%"></svg>
        </div>

        <div class="legend small">
          <span class="chip"><span class="dot" style="background:#8fd694;"></span> TP</span>
          <span class="chip"><span class="dot" style="background:#ff9aa2;"></span> FN</span>
          <span class="chip"><span class="dot" style="background:#ffd27d;"></span> FP</span>
          <span class="chip"><span class="dot" style="background:#b8c0ff;"></span> TN</span>
          <span class="chip"><span class="dot" style="background:transparent; border:1px solid rgba(0,0,0,0.3);"></span> Pos = hatch ↗</span>
          <span class="chip"><span class="dot" style="background:transparent; border:1px solid rgba(0,0,0,0.3);"></span> Neg = hatch ↘</span>
        </div>

        <div class="caption small mono" id="mosaicCaption"></div>
      </div>

      <div class="chartsGrid">
        <div id="counts" class="plot" style="height: 280px;"></div>
        <div id="metrics" class="plot" style="height: 280px;"></div>
      </div>
    </div>

    <!-- INPUTS (will appear second on iPhone) -->
    <div class="card inputsCard">
      <h3 style="margin:0 0 8px;">Inputs</h3>

      <div class="row">
        <label>Dataset size (N)</label>
        <div class="mono" id="nVal"></div>
      </div>
      <input id="n" type="range" min="100" max="500000" step="100" value="10000"/>

      <div class="btns">
        <button id="bal">Balanced (π=0.5)</button>
        <button id="imb">Imbalanced (π=0.1)</button>
        <button id="vimb">Very imbalanced (π=0.01)</button>
      </div>

      <div class="row">
        <label>Prevalence π</label>
        <div class="mono" id="piVal"></div>
      </div>
      <input id="pi" type="range" min="0.001" max="0.999" step="0.001" value="0.10"/>

      <div class="row">
        <label>TPR (Recall)</label>
        <div class="mono" id="tprVal"></div>
      </div>
      <input id="tpr" type="range" min="0" max="1" step="0.001" value="0.85"/>

      <div class="row">
        <label>FPR</label>
        <div class="mono" id="fprVal"></div>
      </div>
      <input id="fpr" type="range" min="0" max="1" step="0.001" value="0.05"/>

      <div class="kpi">
        <div><div class="small">Precision</div><div class="mono" id="precKpi">—</div></div>
        <div><div class="small">Accuracy</div><div class="mono" id="accKpi">—</div></div>
        <div><div class="small">F1</div><div class="mono" id="f1Kpi">—</div></div>
        <div><div class="small">Balanced Acc</div><div class="mono" id="baccKpi">—</div></div>
        <div><div class="small">Specificity (TNR)</div><div class="mono" id="tnrKpi">—</div></div>
        <div><div class="small">NPV</div><div class="mono" id="npvKpi">—</div></div>
      </div>

      <div class="note small" id="note"></div>
    </div>
  </div>

<script>
  const el = (id) => document.getElementById(id);

  el("bal").onclick  = () => { el("pi").value = "0.5";  render(); };
  el("imb").onclick  = () => { el("pi").value = "0.1";  render(); };
  el("vimb").onclick = () => { el("pi").value = "0.01"; render(); };

  function fmt(x){ return (Math.round(x*10000)/10000).toFixed(4); }
  function fmtInt(x){ return Math.round(x).toLocaleString("en-US"); }

  function readParams(){
    return {
      N: parseInt(el("n").value, 10),
      pi: parseFloat(el("pi").value),
      tpr: parseFloat(el("tpr").value),
      fpr: parseFloat(el("fpr").value),
    };
  }

  function compute(p){
    const P  = p.N * p.pi;
    const Nn = p.N * (1 - p.pi);

    const TP = P * p.tpr;
    const FN = P - TP;

    const FP = Nn * p.fpr;
    const TN = Nn - FP;

    const prec = TP / (TP + FP + 1e-15);
    const acc  = (TP + TN) / (p.N + 1e-15);
    const f1   = (2 * prec * p.tpr) / (prec + p.tpr + 1e-15);

    const tnr  = 1 - p.fpr;
    const npv  = TN / (TN + FN + 1e-15);
    const bacc = 0.5 * (p.tpr + tnr);

    return { P, Nn, TP, FP, TN, FN, prec, acc, f1, tnr, npv, bacc };
  }

  function drawMosaic(r){
    const svg = el("mosaic");
    svg.innerHTML = "";

    const W = 1000, H = 500;
    const TOP = 44, innerY = TOP, innerH = H - TOP;

    const total = r.P + r.Nn;

    const wNeg = W * (r.Nn / (total + 1e-15));
    const wPos = W - wNeg;

    const hTN = innerH * (r.TN / (r.Nn + 1e-15));
    const hFP = innerH - hTN;

    const hFN = innerH * (r.FN / (r.P + 1e-15));
    const hTP = innerH - hFN;

    const C_TP = "#8fd694";
    const C_FN = "#ff9aa2";
    const C_FP = "#ffd27d";
    const C_TN = "#b8c0ff";

    const defs = document.createElementNS("http://www.w3.org/2000/svg","defs");

    const patPos = document.createElementNS("http://www.w3.org/2000/svg","pattern");
    patPos.setAttribute("id", "posHatch");
    patPos.setAttribute("patternUnits", "userSpaceOnUse");
    patPos.setAttribute("width", "18");
    patPos.setAttribute("height", "18");
    patPos.setAttribute("patternTransform", "rotate(45)");
    const linePos = document.createElementNS("http://www.w3.org/2000/svg","line");
    linePos.setAttribute("x1", "0"); linePos.setAttribute("y1", "0");
    linePos.setAttribute("x2", "0"); linePos.setAttribute("y2", "18");
    linePos.setAttribute("stroke", "rgba(0,0,0,0.22)");
    linePos.setAttribute("stroke-width", "4");
    patPos.appendChild(linePos);

    const patNeg = document.createElementNS("http://www.w3.org/2000/svg","pattern");
    patNeg.setAttribute("id", "negHatch");
    patNeg.setAttribute("patternUnits", "userSpaceOnUse");
    patNeg.setAttribute("width", "18");
    patNeg.setAttribute("height", "18");
    patNeg.setAttribute("patternTransform", "rotate(-45)");
    const lineNeg = document.createElementNS("http://www.w3.org/2000/svg","line");
    lineNeg.setAttribute("x1", "0"); lineNeg.setAttribute("y1", "0");
    lineNeg.setAttribute("x2", "0"); lineNeg.setAttribute("y2", "18");
    lineNeg.setAttribute("stroke", "rgba(0,0,0,0.18)");
    lineNeg.setAttribute("stroke-width", "4");
    patNeg.appendChild(lineNeg);

    defs.appendChild(patPos);
    defs.appendChild(patNeg);
    svg.appendChild(defs);

    function rect(x,y,w,h,fill,label){
      const R = document.createElementNS("http://www.w3.org/2000/svg","rect");
      R.setAttribute("x", x); R.setAttribute("y", y);
      R.setAttribute("width", w); R.setAttribute("height", h);
      R.setAttribute("fill", fill);
      R.setAttribute("stroke", "rgba(0,0,0,0.30)");
      R.setAttribute("stroke-width", "1");
      svg.appendChild(R);

      // iPhone: label only if enough room
      if (w > 170 && h > 80){
        const T = document.createElementNS("http://www.w3.org/2000/svg","text");
        T.setAttribute("x", x + 10);
        T.setAttribute("y", Math.min(y + h - 12, y + 34));
        T.setAttribute("font-size", "24");
        T.setAttribute("font-family", "ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace");
        T.textContent = label;
        svg.appendChild(T);
      }
    }

    rect(0,    innerY + 0,   wNeg, hTN, C_TN, `TN ${fmtInt(r.TN)}`);
    rect(0,    innerY + hTN, wNeg, hFP, C_FP, `FP ${fmtInt(r.FP)}`);
    rect(wNeg, innerY + 0,   wPos, hFN, C_FN, `FN ${fmtInt(r.FN)}`);
    rect(wNeg, innerY + hFN, wPos, hTP, C_TP, `TP ${fmtInt(r.TP)}`);

    const overlayNeg = document.createElementNS("http://www.w3.org/2000/svg","rect");
    overlayNeg.setAttribute("x", 0);
    overlayNeg.setAttribute("y", innerY);
    overlayNeg.setAttribute("width", wNeg);
    overlayNeg.setAttribute("height", innerH);
    overlayNeg.setAttribute("fill", "url(#negHatch)");
    overlayNeg.setAttribute("pointer-events", "none");
    svg.appendChild(overlayNeg);

    const overlayPos = document.createElementNS("http://www.w3.org/2000/svg","rect");
    overlayPos.setAttribute("x", wNeg);
    overlayPos.setAttribute("y", innerY);
    overlayPos.setAttribute("width", wPos);
    overlayPos.setAttribute("height", innerH);
    overlayPos.setAttribute("fill", "url(#posHatch)");
    overlayPos.setAttribute("pointer-events", "none");
    svg.appendChild(overlayPos);

    if (wNeg > 160){
      const t0 = document.createElementNS("http://www.w3.org/2000/svg","text");
      t0.setAttribute("x", 12);
      t0.setAttribute("y", 26);
      t0.setAttribute("font-size", "22");
      t0.setAttribute("font-weight", "800");
      t0.textContent = "Actual Negative";
      svg.appendChild(t0);
    }
    if (wPos > 160){
      const t1 = document.createElementNS("http://www.w3.org/2000/svg","text");
      t1.setAttribute("x", wNeg + 12);
      t1.setAttribute("y", 26);
      t1.setAttribute("font-size", "22");
      t1.setAttribute("font-weight", "800");
      t1.textContent = "Actual Positive";
      svg.appendChild(t1);
    }

    el("mosaicCaption").textContent =
      `P=${fmtInt(r.P)}  N=${fmtInt(r.Nn)}  |  TP=${fmtInt(r.TP)} FP=${fmtInt(r.FP)} TN=${fmtInt(r.TN)} FN=${fmtInt(r.FN)}`;
  }

  let last = null;

  function render(){
    const p = readParams();
    const r = compute(p);

    el("nVal").textContent   = fmtInt(p.N);
    el("piVal").textContent  = fmt(p.pi);
    el("tprVal").textContent = fmt(p.tpr);
    el("fprVal").textContent = fmt(p.fpr);

    el("precKpi").textContent = fmt(r.prec);
    el("accKpi").textContent  = fmt(r.acc);
    el("f1Kpi").textContent   = fmt(r.f1);

    el("tnrKpi").textContent  = fmt(r.tnr);
    el("npvKpi").textContent  = fmt(r.npv);
    el("baccKpi").textContent = fmt(r.bacc);

    let msg = "";
    if (last){
      const changedN   = p.N !== last.p.N;
      const changedPi  = p.pi !== last.p.pi;
      const changedTpr = p.tpr !== last.p.tpr;
      const changedFpr = p.fpr !== last.p.fpr;

      if (changedN && !changedPi && !changedTpr && !changedFpr){
        msg = `Only N changed → all *rates* stay the same, rectangle areas scale up/down.`;
      } else if (changedPi && !changedTpr && !changedFpr){
        msg = `Only π changed → TPR/FPR unchanged, but precision & FP/TP areas move a lot.`;
      } else if (changedTpr || changedFpr){
        msg = `Changing TPR/FPR changes the *shape* inside each class block (FN↔TP, TN↔FP).`;
      } else {
        msg = `Move sliders to see which parts depend on N, π, TPR, FPR.`;
      }
    } else {
      msg = `Try: keep TPR=0.85 and FPR=0.05, then switch π from 0.5 → 0.01 and watch FP dominate.`;
    }
    el("note").textContent = msg;
    last = { p: { ...p } };

    drawMosaic(r);

    const plotCfg = { displayModeBar: false, responsive: true };

    Plotly.react("counts", [{
      x: ["TP","FP","TN","FN"],
      y: [r.TP, r.FP, r.TN, r.FN],
      type: "bar",
      name: "Counts"
    }], {
      title: "Counts",
      yaxis: { title: "count" },
      margin: { l: 55, r: 20, t: 40, b: 45 }
    }, plotCfg);

    Plotly.react("metrics", [{
      x: ["TPR","FPR","Precision","Accuracy","F1","BalancedAcc","NPV"],
      y: [p.tpr, p.fpr, r.prec, r.acc, r.f1, r.bacc, r.npv],
      type: "bar",
      name: "Rates"
    }], {
      title: "Rates",
      yaxis: { title: "value", range: [0,1] },
      margin: { l: 55, r: 20, t: 40, b: 55 }
    }, plotCfg);
  }

  ["n","pi","tpr","fpr"].forEach(id => el(id).addEventListener("input", render));
  render();

  // Better resize on iPhone (address bar/orientation)
  let resizeTimer = null;
  const doResize = () => {
    try { Plotly.Plots.resize("counts"); } catch(e) {}
    try { Plotly.Plots.resize("metrics"); } catch(e) {}
  };
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(doResize, 120);
  });
  window.addEventListener("orientationchange", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(doResize, 220);
  });
</script>
</body>
</html>
